name: "02 - Advanced BuildKit Mastery"

on:
  push:
    branches: [main, master]
    paths:
      - "02-advanced-buildkit/**"
  pull_request:
    branches: [main, master]
    paths:
      - "02-advanced-buildkit/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Habilita o BuildKit moderno
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Prepara a identidade SSH (O "empréstimo" da chave)
      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # 3. O Build Único e Definitivo
      - name: Build and Validate Exercise 02
        uses: docker/build-push-action@v5
        with:
          context: ./02-advanced-buildkit
          file: ./02-advanced-buildkit/Dockerfile
          push: false
          secrets: |
            "api_token=${{ secrets.MY_API_TOKEN }}"
          ssh: |
            default=${{ env.SSH_AUTH_SOCK }}
          #
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.description="Advanced BuildKit Lab"
